<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Acciones Correctivas - MDSB</title>
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1f2937;--s3:#374151;--tx:#f1f5f9;--tm:#94a3b8;--acc:#3b82f6;--g:#22c55e;--y:#eab308;--r:#ef4444;--o:#f97316;--p:#a855f7;--c:#06b6d4;--pk:#ec4899;--t:#14b8a6;--i:#6366f1;--l:#84cc16;--a:#f59e0b;--rs:#f43f5e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
.wrap{max-width:1440px;margin:0 auto;padding:20px}
.hdr{text-align:center;padding:28px 0 18px;border-bottom:1px solid var(--s3);margin-bottom:28px}
.hdr h1{font-size:1.8rem;font-weight:700}.hdr p{color:var(--tm);font-size:.88rem;margin-top:6px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:28px}
.kpi{background:var(--s1);border-radius:12px;padding:18px;text-align:center;border:1px solid var(--s2)}
.kpi .v{font-size:2rem;font-weight:700}.kpi .l{color:var(--tm);font-size:.78rem;margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;background:var(--s2);color:var(--tm);cursor:pointer;font-size:.82rem;border:1px solid transparent;transition:.2s}
.tab:hover{border-color:var(--acc)}.tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}

/* Panels */
.panel{display:none}.panel.on{display:block}

/* Action Cards */
.ac-grid{display:flex;flex-direction:column;gap:16px}
.ac{background:var(--s1);border-radius:14px;border:1px solid var(--s2);overflow:hidden;transition:.2s}
.ac:hover{border-color:var(--acc)}
.ac-head{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;user-select:none}
.ac-rank{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;flex-shrink:0}
.ac-info{flex:1;min-width:0}
.ac-info h4{font-size:.95rem;font-weight:600;margin-bottom:2px}
.ac-info p{color:var(--tm);font-size:.78rem}
.ac-badges{display:flex;gap:8px;flex-shrink:0;align-items:center}
.badge{padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap}
.ac-arrow{color:var(--tm);font-size:1.2rem;transition:.3s;flex-shrink:0}
.ac.open .ac-arrow{transform:rotate(180deg)}
.ac-body{display:none;padding:0 20px 18px;border-top:1px solid var(--s2)}
.ac.open .ac-body{display:block}

/* Sub-sections inside action */
.ac-section{margin-top:14px}
.ac-section h5{font-size:.82rem;color:var(--tm);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ac-cases{display:flex;flex-wrap:wrap;gap:6px}
.case-chip{background:var(--s2);padding:4px 10px;border-radius:6px;font-size:.72rem;font-family:monospace;color:var(--acc)}
.ac-detail{background:var(--bg);border-radius:10px;padding:14px;margin-top:10px;font-size:.82rem;line-height:1.7}
.ac-detail li{margin-bottom:4px;list-style:none;padding-left:16px;position:relative}
.ac-detail li::before{content:'→';position:absolute;left:0;color:var(--acc)}

/* Impact bar */
.impact-bar{display:flex;align-items:center;gap:10px;margin-top:8px}
.impact-track{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.impact-fill{height:100%;border-radius:4px;transition:width .8s ease}
.impact-label{font-size:.75rem;color:var(--tm);min-width:60px}

/* Table */
.tbl-wrap{background:var(--s1);border-radius:14px;border:1px solid var(--s2);padding:20px;overflow-x:auto}
.tbl-wrap h3{font-size:.95rem;color:var(--tm);margin-bottom:14px}
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filters label{color:var(--tm);font-size:.8rem}
.filters select,.filters input{background:var(--s2);color:var(--tx);border:1px solid var(--s3);border-radius:8px;padding:7px 12px;font-size:.82rem}
.filters input{width:280px}
.tbl-scroll{max-height:550px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--s2);padding:9px 12px;text-align:left;font-weight:600;position:sticky;top:0;z-index:1}
td{padding:9px 12px;border-bottom:1px solid var(--s2)}
tr:hover td{background:rgba(59,130,246,.06)}
.cnt{font-size:.72rem;background:var(--s3);padding:2px 8px;border-radius:10px;margin-left:8px}

/* Pareto */
.pareto-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pareto-lbl{width:280px;font-size:.78rem;text-align:right;flex-shrink:0;color:var(--tm)}
.pareto-track{flex:1;height:24px;background:var(--s3);border-radius:6px;overflow:hidden;position:relative}
.pareto-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:.7rem;font-weight:600}
.pareto-cum{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.68rem;color:var(--tx);opacity:.8}
.pareto-val{width:70px;font-size:.78rem;text-align:right;font-weight:600}

.footer{text-align:center;padding:20px 0;color:var(--tm);font-size:.75rem;border-top:1px solid var(--s3);margin-top:30px}
@media(max-width:768px){.ac-badges{flex-direction:column;gap:4px}.pareto-lbl{width:140px;font-size:.7rem}}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <h1>🎯 Plan de Acciones Correctivas — Casos MDSB</h1>
  <p>Estrategia: atacar causa raíz para resolver el mayor número de casos con el menor número de acciones</p>
</div>

<div class="kpis" id="kpis"></div>

<div class="tabs" id="tabs">
  <div class="tab on" data-t="pareto">📊 Pareto de Impacto</div>
  <div class="tab" data-t="actions">🔧 Acciones Correctivas</div>
  <div class="tab" data-t="table">📋 Detalle por Caso</div>
</div>

<div class="panel on" id="p-pareto"></div>
<div class="panel" id="p-actions"></div>
<div class="panel" id="p-table"></div>

<div class="footer">Generado por Kiro · Abril 2026 · Análisis de 180+ casos MDSB — Seguros Bolívar</div>
</div>
<script>
// ── DATA: Acciones correctivas priorizadas por impacto ──
const actions = [
  {
    id:'AC-01', title:'Implementar sincronización en tiempo real Tronador ↔ Pago en Línea',
    causa:'Desincronización entre el core de pólizas (Tronador) y la plataforma de pagos. Deudas fantasma, pagos no reflejados, pólizas anuladas que siguen cobrando.',
    que:['Crear bus de eventos (Kafka/SQS) entre Tronador y Pago en Línea','Sincronizar estados de póliza: emisión, anulación, pago, cancelación','Conciliación automática post-pago con ePayco y Gateway','Eliminar deudas automáticamente al anular pólizas','Agregar todos los tipos de documento de Tronador a Pago en Línea (ej: Permiso Temporal)'],
    kpi:'Reducir a 0 los casos de deudas fantasma y pagos no reflejados en 30 días post-implementación',
    cases:['MDSB-1015444','MDSB-1015438','MDSB-1014598','MDSB-1014516','MDSB-1013823','MDSB-1013310','MDSB-1012929','MDSB-1011464','MDSB-1011307','MDSB-1006732','MDSB-1004868','MDSB-1004693','MDSB-1003868','MDSB-1003556','MDSB-995268','MDSB-992101','MDSB-985409','MDSB-1004843'],
    impact:18, color:'var(--r)', priority:'Crítica', effort:'Alta', area:'Pagos / Core'
  },
  {
    id:'AC-02', title:'Corregir motor de tarificación y validaciones en Simón Web / Cotizadores',
    causa:'Cálculos de prima incorrectos en modificaciones, exclusiones y cambios de plan. Formularios que no avanzan o pierden datos.',
    que:['Auditar cálculo de prima en: exclusiones de cobertura, cambios de plan, modificaciones de valor asegurado','Corregir persistencia de datos en formularios Pymes (productos 777, 778)','Sincronizar validación de duplicados y estados de póliza con Tronador','Validar transmisión exitosa al RUNT y SISA post-emisión','Agregar validación de tipo de vehículo en regla de continuidad'],
    kpi:'Reducir errores de tarificación a 0 y eliminar bloqueos en cotizadores en 45 días',
    cases:['MDSB-1015402','MDSB-1015376','MDSB-1013501','MDSB-1013062','MDSB-1012792','MDSB-1012790','MDSB-1010337','MDSB-1008620','MDSB-1006762','MDSB-1006535','MDSB-1005515','MDSB-1004266','MDSB-1002245','MDSB-1001202','MDSB-1000952','MDSB-994211','MDSB-994001','MDSB-988188','MDSB-995068','MDSB-1013432'],
    impact:20, color:'var(--p)', priority:'Crítica', effort:'Alta', area:'Simón Web / Motor Tarificación'
  },
  {
    id:'AC-03', title:'Corregir módulo de Cumplimiento: textos RC 214, cambios de clave y cálculos de prima',
    causa:'Textos desordenados/amontonados en pólizas RCE 214. Cambios de clave que no generan el movimiento positivo. Devoluciones de prima incorrectas en reversiones.',
    que:['Corregir paquete de extracción de textos catalogados para RC 214 (interlineado, formato)','Validar que cambio de clave genere par completo de movimientos (negativo + positivo)','Corregir motor de cálculo de devolución de primas en reversiones y prórrogas','Propagar cambios de intermediación a pólizas hijas automáticamente','Liberar cupo automáticamente al cancelar póliza principal'],
    kpi:'Eliminar errores de textos RC 214 y cambios de clave incompletos en 30 días',
    cases:['MDSB-1013797','MDSB-1013739','MDSB-1010882','MDSB-1009864','MDSB-1009757','MDSB-1009097','MDSB-1007627','MDSB-1006712','MDSB-1003198','MDSB-1003090','MDSB-999626','MDSB-999041','MDSB-997668','MDSB-992848','MDSB-990795'],
    impact:15, color:'var(--o)', priority:'Alta', effort:'Media', area:'Cumplimiento / RC'
  },
  {
    id:'AC-04', title:'Optimizar queries SQL críticas y procesos batch de Tronador',
    causa:'Programas batch que pasan de 1.5h a 12h, bloqueos en BD, sentencias SQL sin optimizar reportadas por DBA.',
    que:['Optimizar las 2 sentencias SQL críticas reportadas por DBA (985304, 985300)','Corregir programa CB299236 (facturación batch Bancaseguros) — gestionar locks','Optimizar CB299245 (generación planos BUPA) — degradación de 1.5h a 12h','Agregar índices en consultas de renovación de pólizas hijas','Implementar monitoreo de rendimiento con alertas de tiempos'],
    kpi:'Reducir tiempos de ejecución batch a niveles originales y eliminar bloqueos en 15 días',
    cases:['MDSB-1012702','MDSB-1011743','MDSB-1010315','MDSB-1013007','MDSB-1006270','MDSB-1005736','MDSB-1004921','MDSB-1004245','MDSB-1000311','MDSB-993457','MDSB-990149','MDSB-985304','MDSB-985300'],
    impact:13, color:'var(--y)', priority:'Alta', effort:'Media', area:'Tronador / DBA'
  },
  {
    id:'AC-05', title:'Automatizar actualización de parámetros anuales y corregir bugs de fechas',
    causa:'SMMLV desactualizado en migración a SIPO, parámetros de autorización obsoletos, bug recurrente de fechas 29-30-31 en SIOS.',
    que:['Automatizar actualización de SMMLV al inicio de cada año en todos los sistemas','Corregir definitivamente bug de fechas fin de mes (29-30-31) en SIOS','Automatizar actualización de montos de autorización anuales','Implementar alertas de indemnizaciones pendientes','Crear calendario de parámetros con validación automática'],
    kpi:'Eliminar incidentes por parámetros desactualizados y bugs de fechas en 20 días',
    cases:['MDSB-1005736','MDSB-999067','MDSB-994207','MDSB-986900','MDSB-1011279','MDSB-990240'],
    impact:6, color:'var(--t)', priority:'Media', effort:'Baja', area:'SIOS / Parametrización'
  },
  {
    id:'AC-06', title:'Sincronizar SAI con Tronador y corregir flujos de liquidación',
    causa:'Recaudos contabilizados en Tronador pero no reflejados en SAI. Amparos duplicados en visualización. Errores en retiro de solicitudes.',
    que:['Implementar conciliación automática de recaudos entre Tronador y SAI','Corregir visualización de giros duplicados en estado de cuenta','Validar reglas de convenio en ingreso de amparos integrales','Corregir flujo de retiro de solicitudes'],
    kpi:'Eliminar inconsistencias SAI-Tronador en 25 días',
    cases:['MDSB-1013740','MDSB-1009623','MDSB-1009594','MDSB-1001761'],
    impact:4, color:'var(--c)', priority:'Media', effort:'Media', area:'SAI / Indemnizaciones'
  },
  {
    id:'AC-07', title:'Corregir facturación electrónica: TRM, IVA y componente de asistencia',
    causa:'Discrepancia entre IVA contabilizado y factura electrónica por TRM. Pólizas con asistencia no se facturan.',
    que:['Corregir cálculo de TRM en facturación electrónica','Validar IVA antes de emitir factura','Corregir componente de asistencia en proceso de facturación','Documentar proceso de configuración de resoluciones de numeración'],
    kpi:'Eliminar errores de facturación electrónica en 20 días',
    cases:['MDSB-1014780','MDSB-1010813','MDSB-1007351','MDSB-990769'],
    impact:4, color:'var(--g)', priority:'Media', effort:'Baja', area:'Facturación Electrónica'
  },
  {
    id:'AC-08', title:'Corregir flujos de Módulo Jurídico y Análisis Digital Libertador',
    causa:'Flujos de radicación bloqueados, documentos no asignados automáticamente, comentarios que no se guardan.',
    que:['Validar flujo de radicación para todos los tipos de documento','Corregir automatización de asignación de documentos a analistas','Corregir persistencia de comentarios en análisis digital','Validar permisos de usuario en módulo de etapas'],
    kpi:'Eliminar bloqueos en módulo jurídico y análisis digital en 15 días',
    cases:['MDSB-1009263','MDSB-1008493','MDSB-1007275','MDSB-989979','MDSB-988946'],
    impact:5, color:'var(--i)', priority:'Media', effort:'Baja', area:'Módulo Jurídico / Libertador'
  },
  {
    id:'AC-09', title:'Automatizar gestión de permisos y roles en cambios de cargo/contrato',
    causa:'Cambios de cargo o contrato eliminan permisos funcionales. Roles faltantes en usuarios de Tronador.',
    que:['Preservar permisos funcionales en cambios de cargo y contrato','Automatizar asignación de roles estándar (ROL_USR_FORMS, ROLE_USR_FINAL_TRON)','Sincronizar cambios de beneficiario con generación de certificados'],
    kpi:'Eliminar incidentes de permisos por cambios de cargo en 10 días',
    cases:['MDSB-1009570','MDSB-1003852','MDSB-1008463','MDSB-989141'],
    impact:4, color:'var(--a)', priority:'Baja', effort:'Baja', area:'Permisos / IDM'
  },
  {
    id:'AC-10', title:'Automatizar reversiones de cartera castigada en Huella y corregir compatibilidad',
    causa:'Proceso manual de reversiones de cartera castigada. Conflicto de Huella con All Client Services.',
    que:['Crear flujo self-service para reversiones de cartera castigada','Automatizar proceso de reversión de castigo con validación jurídica','Validar compatibilidad de Huella con All Client Services'],
    kpi:'Reducir tiempo de reversiones de días a minutos',
    cases:['MDSB-1015274','MDSB-999550','MDSB-989665'],
    impact:3, color:'var(--pk)', priority:'Baja', effort:'Baja', area:'Huella / Jurídica'
  },
  {
    id:'AC-11', title:'Corregir parametrización de comisiones y validación de Multiclaves',
    causa:'Comisiones no liberadas post-cambio de clave. Claves intercambiadas entre vitrinas en Multiclaves.',
    que:['Validar liberación de comisión post-cambio de clave','Corregir parametrización de comisiones para agencia proyectiva','Implementar validación de integridad claves vs NIT en Multiclaves'],
    kpi:'Eliminar errores de comisiones y claves intercambiadas en 10 días',
    cases:['MDSB-1013790','MDSB-1013703','MDSB-1010605'],
    impact:3, color:'var(--l)', priority:'Baja', effort:'Baja', area:'Comisiones / Multiclaves'
  }
];

// ── Build case→action map ──
const caseMap = {};
actions.forEach(a => a.cases.forEach(c => { if(!caseMap[c]) caseMap[c]=[]; caseMap[c].push(a); }));
const totalCases = new Set(actions.flatMap(a=>a.cases)).size;
const totalActions = actions.length;

// ── KPIs ──
const cumCases80 = (()=>{ let s=0; for(let i=0;i<actions.length;i++){s+=actions[i].cases.length; if(s/totalCases>=0.8) return i+1;} return actions.length; })();
document.getElementById('kpis').innerHTML = `
  <div class="kpi"><div class="v" style="color:var(--acc)">${totalCases}</div><div class="l">Casos con Causa Raíz</div></div>
  <div class="kpi"><div class="v" style="color:var(--p)">${totalActions}</div><div class="l">Acciones Correctivas</div></div>
  <div class="kpi"><div class="v" style="color:var(--g)">${cumCases80}</div><div class="l">Acciones resuelven 80% casos</div></div>
  <div class="kpi"><div class="v" style="color:var(--r)">${actions[0].cases.length+actions[1].cases.length}</div><div class="l">Casos en Top 2 acciones</div></div>
  <div class="kpi"><div class="v" style="color:var(--o)">3</div><div class="l">Acciones de esfuerzo bajo</div></div>
`;

// ── Tabs ──
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', ()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('p-'+t.dataset.t).classList.add('on');
}));

// ── PARETO ──
const paretoEl = document.getElementById('p-pareto');
let cumPct = 0;
const maxImpact = Math.max(...actions.map(a=>a.cases.length));
let paretoHTML = `<div class="tbl-wrap"><h3>📊 Pareto: Acciones ordenadas por número de casos que resuelven</h3>
<p style="color:var(--tm);font-size:.82rem;margin-bottom:18px">Con las primeras <strong style="color:var(--g)">${cumCases80} acciones</strong> se resuelve el <strong style="color:var(--g)">80%</strong> de los casos. Priorizar estas acciones maximiza el impacto.</p>`;
actions.forEach((a,i) => {
  const pct = (a.cases.length/totalCases*100);
  cumPct += pct;
  const w = (a.cases.length/maxImpact*100);
  paretoHTML += `<div class="pareto-row">
    <div class="pareto-lbl">${a.id} · ${a.title.substring(0,50)}${a.title.length>50?'…':''}</div>
    <div class="pareto-track"><div class="pareto-fill" style="width:${w}%;background:${a.color}">${a.cases.length} casos</div><div class="pareto-cum">${cumPct.toFixed(0)}% acum.</div></div>
    <div class="pareto-val" style="color:${a.color}">${pct.toFixed(1)}%</div>
  </div>`;
});
paretoHTML += `<div style="margin-top:18px;padding:14px;background:var(--bg);border-radius:10px;font-size:.82rem">
  <strong style="color:var(--g)">💡 Conclusión Pareto:</strong> Las primeras ${cumCases80} acciones (AC-01 a AC-0${cumCases80}) resuelven el ~80% de los casos. 
  Enfocarse en <strong>sincronización de pagos</strong>, <strong>motor de tarificación</strong>, <strong>módulo cumplimiento</strong> y <strong>optimización SQL</strong> genera el mayor retorno.
</div></div>`;
paretoEl.innerHTML = paretoHTML;

// ── ACTIONS ──
const actEl = document.getElementById('p-actions');
let actHTML = '<div class="ac-grid">';
actions.forEach((a,i) => {
  const prioColor = a.priority==='Crítica'?'var(--r)':a.priority==='Alta'?'var(--o)':'var(--y)';
  const effColor = a.effort==='Alta'?'var(--r)':a.effort==='Media'?'var(--o)':'var(--g)';
  actHTML += `<div class="ac" id="ac-${i}">
    <div class="ac-head" onclick="this.parentElement.classList.toggle('open')">
      <div class="ac-rank" style="background:${a.color}22;color:${a.color}">${i+1}</div>
      <div class="ac-info"><h4>${a.id} · ${a.title}</h4><p>${a.area}</p></div>
      <div class="ac-badges">
        <span class="badge" style="background:${a.color}22;color:${a.color};border:1px solid ${a.color}44">${a.cases.length} casos</span>
        <span class="badge" style="background:${prioColor}22;color:${prioColor};border:1px solid ${prioColor}44">Prioridad: ${a.priority}</span>
        <span class="badge" style="background:${effColor}22;color:${effColor};border:1px solid ${effColor}44">Esfuerzo: ${a.effort}</span>
      </div>
      <div class="ac-arrow">▼</div>
    </div>
    <div class="ac-body">
      <div class="ac-section"><h5>🔍 Causa Raíz</h5><p style="font-size:.85rem">${a.causa}</p></div>
      <div class="ac-section"><h5>🔧 Qué hacer (acciones específicas)</h5>
        <div class="ac-detail"><ul>${a.que.map(q=>`<li>${q}</li>`).join('')}</ul></div>
      </div>
      <div class="ac-section"><h5>📏 KPI de éxito</h5><p style="font-size:.85rem;color:var(--g)">${a.kpi}</p></div>
      <div class="ac-section"><h5>📎 Casos que resuelve (${a.cases.length})</h5>
        <div class="ac-cases">${a.cases.map(c=>`<span class="case-chip">${c}</span>`).join('')}</div>
      </div>
      <div class="ac-section"><h5>📊 Impacto relativo</h5>
        <div class="impact-bar">
          <div class="impact-track"><div class="impact-fill" style="width:${(a.cases.length/maxImpact*100)}%;background:${a.color}"></div></div>
          <div class="impact-label">${(a.cases.length/totalCases*100).toFixed(1)}% del total</div>
        </div>
      </div>
    </div>
  </div>`;
});
actHTML += '</div>';
actEl.innerHTML = actHTML;

// ── TABLE ──
const tblEl = document.getElementById('p-table');
const allRows = [];
actions.forEach(a => a.cases.forEach(c => allRows.push([c, a.id, a.title, a.causa.split('.')[0], a.que[0], a.color, a.priority, a.area])));
allRows.sort((a,b) => a[0]<b[0]?1:-1);

function renderTable(filter, search){
  const tbody = document.getElementById('tBody');
  tbody.innerHTML = '';
  let count = 0;
  allRows.forEach(([mdsb, aid, title, causa, accion, color, prio, area]) => {
    if(filter && aid !== filter) return;
    const txt = (mdsb+aid+title+causa+accion+area).toLowerCase();
    if(search && !txt.includes(search.toLowerCase())) return;
    const prioColor = prio==='Crítica'?'var(--r)':prio==='Alta'?'var(--o)':'var(--y)';
    tbody.innerHTML += `<tr>
      <td><strong style="color:var(--acc)">${mdsb}</strong></td>
      <td><span class="badge" style="background:${color}22;color:${color};border:1px solid ${color}44;font-size:.7rem">${aid}</span></td>
      <td style="font-size:.78rem">${title.substring(0,60)}${title.length>60?'…':''}</td>
      <td style="font-size:.78rem;color:var(--tm)">${causa}</td>
      <td style="font-size:.78rem">${accion}</td>
      <td><span class="badge" style="background:${prioColor}22;color:${prioColor};font-size:.68rem">${prio}</span></td>
    </tr>`;
    count++;
  });
  document.getElementById('tCount').textContent = count+' casos';
}

let tblHTML = `<div class="tbl-wrap"><h3>📋 Todos los casos con su acción correctiva asignada <span class="cnt" id="tCount">0</span></h3>
<div class="filters">
  <label>Acción:</label><select id="fAct"><option value="">Todas</option>${actions.map(a=>`<option value="${a.id}">${a.id} · ${a.title.substring(0,40)}…</option>`).join('')}</select>
  <label>Buscar:</label><input id="fSearch" placeholder="MDSB, acción, causa...">
</div>
<div class="tbl-scroll"><table><thead><tr><th>MDSB</th><th>Acción</th><th>Acción Correctiva</th><th>Causa Raíz</th><th>Qué hacer</th><th>Prioridad</th></tr></thead><tbody id="tBody"></tbody></table></div></div>`;
tblEl.innerHTML = tblHTML;
document.getElementById('fAct').addEventListener('change', ()=>renderTable(document.getElementById('fAct').value, document.getElementById('fSearch').value));
document.getElementById('fSearch').addEventListener('input', ()=>renderTable(document.getElementById('fAct').value, document.getElementById('fSearch').value));
renderTable('','');
</script>
</body>
</html>
